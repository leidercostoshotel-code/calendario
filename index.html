<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leider Tisnado Mego - Mis Agendas</title>
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <meta name="theme-color" content="#1e3c72">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Agenda">
    <link rel="apple-touch-icon" href="icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{
            --blue1:#1e3c72;--blue2:#2a5298;--blue3:#3467b7;--blue-light:#e8f0fe;
            --purple1:#8e44ad;--purple2:#9b59b6;--purple-light:#f3e8ff;
            --green1:#1e8449;--green2:#27ae60;--green3:#2ecc71;--green-light:#e6faf0;
            --teal1:#16a085;--teal2:#1abc9c;--teal-light:#e6faf5;
            --orange1:#e67e22;--orange2:#f39c12;--orange3:#f1c40f;--orange-light:#fef9e7;
            --red1:#c0392b;--red2:#e74c3c;--red3:#f5576c;
            --white:#ffffff;--offwhite:#f8f9fc;--gray1:#f0f2f5;--gray2:#e0e3e8;
            --gray3:#b0b5bf;--gray4:#6b7280;--gray5:#374151;
            --shadow-sm:0 2px 8px rgba(30,60,114,0.08);
            --shadow-md:0 8px 30px rgba(30,60,114,0.12);
            --shadow-lg:0 16px 50px rgba(30,60,114,0.18);
            --shadow-xl:0 24px 60px rgba(30,60,114,0.22);
            --glass:rgba(255,255,255,0.7);--glass2:rgba(255,255,255,0.85);
            --serif:'Playfair Display',Georgia,serif;
            --sans:'DM Sans',sans-serif;
            --mono:'Space Mono',monospace;
            --radius:16px;--radius-sm:10px;--radius-xs:6px;
        }
        html{scroll-behavior:smooth;}
        body{
            font-family:var(--sans);
            background:linear-gradient(160deg,#1e3c72 0%,#2a5298 35%,#3467b7 65%,#1e3c72 100%);
            background-attachment:fixed;
            min-height:100vh;padding:24px;-webkit-font-smoothing:antialiased;color:var(--gray5);
        }
        body::before,body::after{content:'';position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px);opacity:0.3;}
        body::before{width:500px;height:500px;top:-100px;right:-100px;background:radial-gradient(circle,rgba(155,89,182,0.4),transparent 70%);animation:orbFloat 18s ease-in-out infinite;}
        body::after{width:400px;height:400px;bottom:-80px;left:-80px;background:radial-gradient(circle,rgba(26,188,156,0.3),transparent 70%);animation:orbFloat 22s ease-in-out infinite reverse;}
        @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(40px,-30px) scale(1.1);}66%{transform:translate(-20px,40px) scale(0.95);}}

        .container{max-width:1440px;margin:0 auto;position:relative;z-index:1;}

        /* HEADER */
        .header{text-align:center;color:var(--white);margin-bottom:28px;position:sticky;top:0;z-index:100;background:linear-gradient(135deg,rgba(30,60,114,0.95),rgba(42,82,152,0.95));backdrop-filter:blur(20px);padding:18px 28px;border-radius:var(--radius);box-shadow:var(--shadow-xl);border:1px solid rgba(255,255,255,0.1);}
        .header h1{font-family:var(--serif);font-size:1.8em;font-weight:700;text-shadow:0 2px 12px rgba(0,0,0,0.2);margin-bottom:4px;letter-spacing:1px;}
        .header h1 .subtitle{font-family:var(--sans);font-size:0.5em;font-weight:300;opacity:0.8;letter-spacing:2px;text-transform:uppercase;display:block;margin-top:2px;}
        .header p{font-size:0.88em;opacity:0.85;font-weight:300;letter-spacing:0.5px;}
        .news-ticker{background:rgba(255,255,255,0.12);backdrop-filter:blur(10px);padding:10px 0;margin-top:12px;border-radius:var(--radius-sm);overflow:hidden;position:relative;height:40px;border:1px solid rgba(255,255,255,0.08);}
        .ticker-content{display:flex;align-items:center;white-space:nowrap;animation:scroll-left 35s linear infinite;}
        .ticker-item{display:inline-flex;align-items:center;margin-right:50px;font-size:0.88em;font-weight:400;}
        .ticker-icon{margin-right:10px;font-size:1.15em;}
        @keyframes scroll-left{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}

        /* TAB NAV */
        .tab-nav{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
        .tab-btn{
            padding:12px 28px;border-radius:var(--radius-sm);border:none;cursor:pointer;
            font-family:var(--sans);font-size:0.92em;font-weight:600;letter-spacing:0.3px;
            background:var(--glass);backdrop-filter:blur(10px);color:var(--white);
            border:1px solid rgba(255,255,255,0.2);
            transition:all 0.3s;box-shadow:var(--shadow-sm);
        }
        .tab-btn:hover{background:rgba(255,255,255,0.3);transform:translateY(-2px);box-shadow:var(--shadow-md);}
        .tab-btn.active{background:var(--white);color:var(--blue1);box-shadow:var(--shadow-lg);border-color:transparent;}
        .tab-content{display:none;}
        .tab-content.active{display:block;animation:fadeUp 0.4s ease;}

        /* GRID */
        .main-grid{display:grid;grid-template-columns:1fr 2fr;gap:24px;margin-bottom:28px;}

        /* CARDS */
        .card{background:var(--glass2);backdrop-filter:blur(16px);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow-lg);border:1px solid rgba(255,255,255,0.5);transition:transform 0.4s cubic-bezier(0.22,1,0.36,1),box-shadow 0.4s;}
        .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-xl);}
        .card h2{font-family:var(--serif);color:var(--blue1);margin-bottom:22px;font-size:1.5em;display:flex;align-items:center;gap:10px;}
        .icon-3d{font-size:1.3em;filter:drop-shadow(2px 3px 4px rgba(30,60,114,0.2));}

        /* FORM */
        .input-group{margin-bottom:18px;}
        .input-group label{display:block;color:var(--gray4);font-weight:600;margin-bottom:8px;font-size:0.78em;text-transform:uppercase;letter-spacing:1.5px;}
        .input-group input,.input-group textarea,.input-group select{width:100%;padding:13px 16px;background:var(--white);border:2px solid var(--gray2);border-radius:var(--radius-sm);font-size:0.95em;color:var(--gray5);font-family:var(--sans);transition:border 0.3s,box-shadow 0.3s;}
        .input-group input:focus,.input-group textarea:focus,.input-group select:focus{outline:none;border-color:var(--blue2);box-shadow:0 0 0 4px rgba(42,82,152,0.1);}
        .input-group textarea{resize:vertical;min-height:100px;}
        .btn{background:linear-gradient(135deg,var(--blue1),var(--blue2));color:var(--white);border:none;padding:15px 28px;border-radius:var(--radius-sm);font-size:1em;cursor:pointer;width:100%;font-weight:700;font-family:var(--sans);letter-spacing:0.5px;transition:all 0.3s;box-shadow:0 4px 15px rgba(30,60,114,0.3);}
        .btn:hover{box-shadow:0 8px 25px rgba(30,60,114,0.4);transform:translateY(-2px);}
        .btn-sm{padding:10px 20px;font-size:0.88em;width:auto;display:inline-flex;align-items:center;gap:6px;}
        .btn-green{background:linear-gradient(135deg,var(--green2),var(--green1));}
        .btn-purple{background:linear-gradient(135deg,var(--purple2),var(--purple1));}
        .btn-orange{background:linear-gradient(135deg,var(--orange1),var(--orange2));}
        .btn-red{background:linear-gradient(135deg,var(--red1),var(--red2));box-shadow:0 4px 15px rgba(192,57,43,0.3);}
        .btn-red:hover{box-shadow:0 8px 25px rgba(192,57,43,0.4);}
        .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}

        /* AUTOCOMPLETE / PREDICTIVE */
        .autocomplete-wrap{position:relative;}
        .autocomplete-list{
            position:absolute;top:100%;left:0;right:0;z-index:50;
            background:var(--white);border:2px solid var(--blue2);border-top:none;
            border-radius:0 0 var(--radius-sm) var(--radius-sm);
            max-height:200px;overflow-y:auto;display:none;
            box-shadow:0 12px 30px rgba(30,60,114,0.2);
        }
        .autocomplete-list.show{display:block;animation:fadeUp 0.2s ease;}
        .autocomplete-item{
            padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;
            transition:background 0.15s;font-size:0.92em;border-bottom:1px solid var(--gray1);
        }
        .autocomplete-item:last-child{border-bottom:none;}
        .autocomplete-item:hover,.autocomplete-item.selected{background:var(--blue-light);}
        .autocomplete-item .ac-avatar{
            width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
            color:var(--white);font-weight:700;font-size:0.78em;flex-shrink:0;
        }
        .autocomplete-item .ac-info{flex:1;}
        .autocomplete-item .ac-name{font-weight:600;color:var(--gray5);}
        .autocomplete-item .ac-detail{font-size:0.78em;color:var(--gray3);}
        .ac-highlight{background:rgba(42,82,152,0.15);border-radius:3px;padding:0 2px;font-weight:700;}

        /* PERSON TAGS in form */
        .person-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
        .person-tag{
            display:inline-flex;align-items:center;gap:6px;padding:5px 12px 5px 6px;
            border-radius:20px;font-size:0.82em;font-weight:600;color:var(--white);
            animation:fadeUp 0.2s ease;
        }
        .person-tag .tag-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.65em;font-weight:700;background:rgba(255,255,255,0.3);}
        .person-tag .tag-remove{cursor:pointer;opacity:0.7;transition:opacity 0.2s;font-size:1.1em;}
        .person-tag .tag-remove:hover{opacity:1;}

        /* CALENDAR */
        .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:18px;}
        .calendar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
        .calendar-header button{background:linear-gradient(135deg,var(--blue1),var(--blue2));color:var(--white);border:none;padding:10px 22px;border-radius:var(--radius-xs);cursor:pointer;font-weight:600;font-family:var(--sans);font-size:0.85em;transition:all 0.3s;box-shadow:0 3px 10px rgba(30,60,114,0.2);}
        .calendar-header button:hover{transform:translateY(-1px);box-shadow:0 5px 15px rgba(30,60,114,0.3);}
        .calendar-header h3{font-family:var(--serif);color:var(--blue1);font-size:1.4em;font-weight:700;}
        .day-label{text-align:center;font-weight:700;color:var(--blue1);padding:10px;font-size:0.75em;text-transform:uppercase;letter-spacing:1.5px;}
        .day-cell{background:linear-gradient(145deg,var(--offwhite),var(--gray1));border-radius:var(--radius-sm);padding:12px 8px 24px 8px;min-height:75px;cursor:pointer;transition:all 0.3s cubic-bezier(0.22,1,0.36,1);position:relative;border:1px solid transparent;}
        .day-cell.weekend-day{background:linear-gradient(145deg,#e8f4fc,#d6eaf8);}
        .day-cell:hover{transform:translateY(-3px) scale(1.03);box-shadow:var(--shadow-md);background:linear-gradient(135deg,var(--blue1),var(--blue2));color:var(--white);}
        .day-cell:hover .day-number{color:var(--white)!important;}
        .day-cell.other-month{opacity:0.25;}
        .day-cell.today{background:linear-gradient(135deg,var(--blue2),var(--blue1));color:var(--white);font-weight:bold;box-shadow:0 6px 20px rgba(30,60,114,0.35);border:2px solid rgba(255,255,255,0.3);}
        .day-cell.today .day-number{color:var(--white)!important;font-weight:800;}
        .day-cell.has-notes{background:linear-gradient(135deg,var(--blue3),var(--blue2));color:var(--white);}
        .day-cell.has-notes .day-number{color:var(--white)!important;}
        .day-cell.holiday{background:linear-gradient(135deg,var(--purple1),var(--purple2));color:var(--white);font-weight:bold;box-shadow:0 4px 15px rgba(142,68,173,0.3);}
        .day-cell.holiday .day-number{color:var(--white)!important;}
        .day-cell.birthday{background:linear-gradient(135deg,var(--orange1),var(--orange2));color:var(--white);font-weight:bold;animation:subtleGlow 3s ease-in-out infinite;box-shadow:0 4px 15px rgba(243,156,18,0.3);}
        .day-cell.birthday .day-number{color:var(--white)!important;}
        @keyframes subtleGlow{0%,100%{box-shadow:0 4px 15px rgba(243,156,18,0.3);}50%{box-shadow:0 6px 25px rgba(243,156,18,0.5);}}
        .day-number{font-weight:700;margin-bottom:4px;color:var(--gray5);font-size:0.95em;font-family:var(--mono);}
        .day-cell.weekend-day .day-number{color:#0e7490;}
        .holiday-badge{position:absolute;bottom:4px;left:3px;right:3px;background:rgba(255,255,255,0.92);color:var(--purple1);border-radius:var(--radius-xs);padding:3px 5px;font-size:0.62em;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;backdrop-filter:blur(4px);}
        .birthday-badge{position:absolute;bottom:4px;left:3px;right:3px;background:rgba(255,255,255,0.92);color:var(--orange1);border-radius:var(--radius-xs);padding:3px 5px;font-size:0.62em;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;}
        .notes-badge{position:absolute;top:5px;right:5px;background:var(--red3);color:var(--white);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:0.75em;font-weight:700;font-family:var(--mono);box-shadow:0 2px 6px rgba(245,87,108,0.4);}

        /* NOTES */
        .notes-section{grid-column:1/-1;}
        .notes-section h2 span{font-size:0.55em;color:var(--gray3);font-family:var(--sans);font-weight:300;}
        .notes-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px;margin-top:20px;}

        /* Person groups grid: side by side */
        .person-groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;margin-bottom:24px;align-items:start;}
        .person-group{}
        .person-group-header{
            display:flex;align-items:center;gap:12px;margin-bottom:12px;
            padding:10px 16px;background:var(--white);border-radius:var(--radius-sm);
            box-shadow:var(--shadow-sm);border:1px solid var(--gray2);
        }
        .person-group-header .pg-avatar{
            width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
            color:var(--white);font-weight:700;font-size:0.82em;flex-shrink:0;
            box-shadow:0 3px 10px rgba(0,0,0,0.15);
        }
        .person-group-header .pg-name{font-family:var(--serif);font-size:1.08em;font-weight:700;color:var(--blue1);}
        .person-group-header .pg-count{font-size:0.75em;color:var(--gray3);font-weight:500;margin-left:auto;}
        .person-group-list{display:flex;flex-direction:column;gap:10px;}
        .note-card{border-radius:var(--radius);padding:22px;position:relative;overflow:hidden;transition:all 0.4s cubic-bezier(0.22,1,0.36,1);cursor:pointer;color:var(--white);}
        .note-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-xl);}
        .note-card.priority-alta{background:linear-gradient(135deg,var(--purple2),var(--purple1));box-shadow:0 8px 0 #6c3483,0 12px 25px rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.15);transform:translateY(-2px);}
        .note-card.priority-alta:hover{transform:translateY(-6px);box-shadow:0 4px 0 #6c3483,0 16px 35px rgba(0,0,0,0.3);}
        .note-card.priority-media{background:linear-gradient(135deg,var(--blue3),var(--blue2));box-shadow:var(--shadow-md);border:1px solid rgba(255,255,255,0.12);}
        .note-card.priority-baja{background:linear-gradient(135deg,var(--teal1),var(--teal2));box-shadow:var(--shadow-md);border:1px solid rgba(255,255,255,0.12);}
        .note-card.birthday{background:linear-gradient(135deg,var(--orange1),var(--orange2));border:2px solid rgba(255,255,255,0.3);box-shadow:0 6px 20px rgba(243,156,18,0.35);}
        .note-card.birthday::before{content:'\1F382';position:absolute;top:-12px;right:-12px;font-size:3em;opacity:0.2;}
        .note-card.completed{background:linear-gradient(135deg,var(--green1),var(--green2))!important;opacity:0.75;box-shadow:var(--shadow-sm)!important;transform:none!important;}
        .note-card.completed h3{text-decoration:line-through;opacity:0.8;}
        .note-card h3{margin-bottom:10px;font-size:1.15em;font-family:var(--serif);font-weight:700;}
        .note-card p{margin-bottom:10px;line-height:1.65;font-size:0.9em;opacity:0.92;}
        .note-date{font-size:0.82em;opacity:0.85;display:flex;align-items:center;gap:5px;margin-top:10px;}
        .note-people{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
        .note-people-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px 3px 4px;border-radius:14px;font-size:0.72em;font-weight:600;background:rgba(255,255,255,0.2);}
        .note-people-tag .mini-avatar{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.6em;font-weight:700;background:rgba(255,255,255,0.3);}
        .note-actions{position:absolute;top:12px;right:12px;display:flex;gap:6px;}
        .action-btn{background:rgba(255,255,255,0.25);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.15);color:var(--white);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:1.15em;display:flex;align-items:center;justify-content:center;transition:all 0.3s;}
        .action-btn:hover{background:rgba(255,255,255,0.4);transform:scale(1.1);}

        /* CONTACTS SECTION */
        .contacts-grid{display:grid;grid-template-columns:320px 1fr;gap:24px;}
        .contact-card{
            display:flex;align-items:center;gap:14px;padding:14px 18px;
            background:var(--white);border-radius:var(--radius-sm);
            border:1px solid var(--gray2);transition:all 0.3s;cursor:pointer;
            margin-bottom:10px;
        }
        .contact-card:hover{transform:translateX(4px);box-shadow:var(--shadow-md);border-color:var(--blue2);}
        .contact-avatar{
            width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;
            color:var(--white);font-weight:700;font-size:1em;flex-shrink:0;
            box-shadow:0 3px 10px rgba(0,0,0,0.15);
        }
        .contact-info{flex:1;min-width:0;}
        .contact-name{font-weight:700;color:var(--gray5);font-size:0.95em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .contact-detail{font-size:0.78em;color:var(--gray3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .contact-actions{display:flex;gap:4px;}
        .contact-actions button{
            width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;
            font-size:0.9em;display:flex;align-items:center;justify-content:center;
            background:var(--gray1);color:var(--gray4);transition:all 0.2s;
        }
        .contact-actions button:hover{background:var(--blue-light);color:var(--blue1);transform:scale(1.1);}
        .contacts-list-wrap{max-height:600px;overflow-y:auto;padding-right:6px;}
        .contact-count{font-size:0.82em;color:var(--gray3);margin-bottom:14px;font-weight:500;}

        /* SEARCH BAR (contacts) */
        .search-bar{position:relative;margin-bottom:18px;}
        .search-bar input{width:100%;padding:13px 16px 13px 44px;background:var(--white);border:2px solid var(--gray2);border-radius:var(--radius-sm);font-size:0.95em;color:var(--gray5);font-family:var(--sans);transition:border 0.3s,box-shadow 0.3s;}
        .search-bar input:focus{outline:none;border-color:var(--blue2);box-shadow:0 0 0 4px rgba(42,82,152,0.1);}
        .search-bar .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1.1em;color:var(--gray3);}
        .search-bar .search-clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:1.1em;color:var(--gray3);cursor:pointer;display:none;background:none;border:none;}
        .search-bar .search-clear:hover{color:var(--red2);}

        /* MODAL */
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);display:none;justify-content:center;align-items:center;z-index:1000;opacity:0;transition:opacity 0.3s;}
        .modal-overlay.open{display:flex;opacity:1;}
        .modal-content{background:var(--white);padding:30px;border-radius:var(--radius);box-shadow:var(--shadow-xl);width:90%;max-width:600px;position:relative;max-height:80vh;overflow-y:auto;transform:translateY(-30px);transition:transform 0.3s;}
        .modal-overlay.open .modal-content{transform:translateY(0);}
        .modal-content h2{font-family:var(--serif);color:var(--blue1);border-bottom:2px solid var(--gray2);padding-bottom:14px;margin-bottom:20px;font-size:1.2em;}
        .modal-close{position:absolute;top:15px;right:15px;background:none;border:none;font-size:1.3em;cursor:pointer;color:var(--gray3);transition:color 0.2s;}
        .modal-close:hover{color:var(--red2);}

            /* Handle bar en el modal */

            /* Ticker compacto */
            @keyframes scroll-left{0%{transform:translateX(100vw);}100%{transform:translateX(-100%);}}
        }

        /* ===== TELÉFONOS PEQUEÑOS ===== */
        @media(max-width:380px){

            .calendar-header button{padding:7px 10px;font-size:0.72em;}

        }
    </style>
</head>

const AVATAR_COLORS = [

function setSyncStatus(status, msg) {
    syncStatus = status;
    const el = document.getElementById('syncIndicator');
    if (!el) return;
    const colors = { syncing: 'var(--orange2)', synced: 'var(--green2)', error: 'var(--red2)', local: 'var(--gray3)' };
    const icons = { syncing: '\u21bb', synced: '\u2713', error: '\u2717', local: '\u25cb' };
    const labels = { syncing: 'Sincronizando...', synced: msg || 'Sincronizado', error: msg || 'Error de sync', local: 'Solo local' };
    el.innerHTML = `<span style="color:${colors[status]};font-weight:600;">${icons[status]} ${labels[status]}</span>`;
}

// JSONP helper — works from file:// without CORS issues
let jsonpCounter = 0;
function jsonpRequest(url) {
    return new Promise((resolve, reject) => {
        const cbName = '__jsonpCb_' + (++jsonpCounter) + '_' + Date.now();
        const timeout = setTimeout(() => {
            delete window[cbName];
            if (script.parentNode) script.parentNode.removeChild(script);
            reject(new Error('Timeout'));
        }, 15000);

        window[cbName] = function(data) {
            clearTimeout(timeout);
            delete window[cbName];
            if (script.parentNode) script.parentNode.removeChild(script);
            resolve(data);
        };

        const script = document.createElement('script');
        script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
        script.onerror = function() {
            clearTimeout(timeout);
            delete window[cbName];
            if (script.parentNode) script.parentNode.removeChild(script);
            reject(new Error('Network error'));
        };
        document.head.appendChild(script);
    });
}

async function cloudSave() {
    if (!SHEET_URL) { setSyncStatus('local'); return; }
    setSyncStatus('syncing');
    pendingSaves++;
    try {
        // For large data, split into chunks if needed
        const notesStr = encodeURIComponent(JSON.stringify(notes));
        const contactsStr = encodeURIComponent(JSON.stringify(contacts));
        const url = SHEET_URL + '?action=saveAll&notes=' + notesStr + '&contacts=' + contactsStr;

        // If URL too long (>8000), use a form POST approach
        if (url.length > 8000) {
            await cloudSaveViaForm();
            return;
        }

        const d = await jsonpRequest(url);
        if (d.success) {
            lastSync = new Date();
            setSyncStatus('synced', 'Sync ' + lastSync.toLocaleTimeString('es-PE', {hour:'2-digit',minute:'2-digit'}));
        } else {
            console.error('[cloudSave] Apps Script respondi\u00f3 error:', d);
            setSyncStatus('error', d.error || 'Error al guardar');
        }
    } catch(e) {
        console.error('[cloudSave] Fallo de red/JSONP:', e);
        setSyncStatus('error', 'Sin conexi\u00f3n al guardar');
    } finally {
        pendingSaves = Math.max(0, pendingSaves - 1);
    }
}

// Fallback for large payloads — POST via hidden form + iframe
function cloudSaveViaForm() {
    return new Promise((resolve) => {
        const iframe = document.createElement('iframe');
        iframe.name = 'syncFrame_' + Date.now();
        iframe.style.display = 'none';
        document.body.appendChild(iframe);

        const form = document.createElement('form');
        form.method = 'POST';
        form.action = SHEET_URL;
        form.target = iframe.name;

        const addField = (name, value) => {
            const input = document.createElement('input');
            input.type = 'hidden'; input.name = name; input.value = value;
            form.appendChild(input);
        };
        addField('action', 'saveAll');
        addField('notes', JSON.stringify(notes));
        addField('contacts', JSON.stringify(contacts));

        document.body.appendChild(form);
        form.submit();

        // Can't read iframe response cross-origin, assume success after delay
        setTimeout(() => {
            document.body.removeChild(form);
            document.body.removeChild(iframe);
            lastSync = new Date();
            setSyncStatus('synced', 'Sync ' + lastSync.toLocaleTimeString('es-PE', {hour:'2-digit',minute:'2-digit'}));
            resolve();
        }, 3000);
    });
}

async function cloudLoad() {
    if (!SHEET_URL) { setSyncStatus('local'); return false; }
    setSyncStatus('syncing');
    try {
        const d = await jsonpRequest(SHEET_URL + '?action=getAll');
        if (d.success) {
            // Aceptamos arrays vac\u00edos: si en otro dispositivo borraste todo,
            // queremos que la eliminaci\u00f3n se propague (antes se ignoraba).
            if (Array.isArray(d.notes)) {
                notes = d.notes.map(n => ({
                    ...n,
                    date: normalizeDate(n.date),
                    isRecurring: n.isRecurring === true || n.isRecurring === 'true',
                    completed: n.completed === true || n.completed === 'true',
                    people: Array.isArray(n.people) ? n.people.map(Number) : []
                }));
                localStorage.setItem('agendaNotes', JSON.stringify(notes));
            }
            if (Array.isArray(d.contacts)) {
                contacts = d.contacts;
                localStorage.setItem('agendaContacts', JSON.stringify(contacts));
            }
            lastSync = new Date();
            setSyncStatus('synced', 'Cargado ' + lastSync.toLocaleTimeString('es-PE', {hour:'2-digit',minute:'2-digit'}));
            return true;
        } else {
            console.error('[cloudLoad] Apps Script respondi\u00f3 error:', d);
            setSyncStatus('error', d.error || 'Error al cargar');
            return false;
        }
    } catch(e) {
        console.error('[cloudLoad] Fallo de red/JSONP:', e);
        setSyncStatus('error', 'Sin conexi\u00f3n al cargar');
        return false;
    }
}

// Normaliza cualquier formato de fecha a YYYY-MM-DD
function normalizeDate(d){
    if(!d) return '';
    if(typeof d==='string'){
        // Ya está en formato correcto
        if(/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
        // Intenta parsear otro formato (ej: ISO con hora, DD/MM/YYYY, etc.)
        const p=new Date(d);
        if(!isNaN(p)) return p.getFullYear()+'-'+String(p.getMonth()+1).padStart(2,'0')+'-'+String(p.getDate()).padStart(2,'0');
    }
    if(d instanceof Date&&!isNaN(d)) return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    return '';
}

function switchTab(tab){
    document.querySelectorAll('.tab-btn').forEach((b,i)=>{b.classList.toggle('active',['agenda','contacts'][i]===tab);});
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));

// ======= AUTOCOMPLETE (Person search in note form) =======
const personInput=document.getElementById('personSearch');
const personDrop=document.getElementById('personDropdown');

personInput.addEventListener('input',function(){
    const q=this.value.trim().toLowerCase();acIndex=-1;
    if(!q){personDrop.classList.remove('show');return;}
    const matches=contacts.filter(c=>c.name.toLowerCase().includes(q)&&!selectedPersonIds.includes(c.id));
    if(!matches.length){personDrop.classList.remove('show');return;}
    personDrop.innerHTML=matches.slice(0,8).map((c,i)=>{
        const hl=c.name.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<span class="ac-highlight">$1</span>');
        return `<div class="autocomplete-item" data-id="${c.id}" onclick="selectPerson(${c.id})">
            <div class="ac-avatar" style="background:${getAvatarColor(c.name)}">${getInitials(c.name)}</div>
            <div class="ac-info"><div class="ac-name">${hl}</div><div class="ac-detail">${c.category||''} ${c.phone?'· '+c.phone:''}</div></div>
        </div>`;
    }).join('');
    personDrop.classList.add('show');
});

personInput.addEventListener('keydown',function(e){
    const items=personDrop.querySelectorAll('.autocomplete-item');
    if(!items.length) return;
    if(e.key==='ArrowDown'){e.preventDefault();acIndex=Math.min(acIndex+1,items.length-1);items.forEach((it,i)=>it.classList.toggle('selected',i===acIndex));}
    else if(e.key==='ArrowUp'){e.preventDefault();acIndex=Math.max(acIndex-1,0);items.forEach((it,i)=>it.classList.toggle('selected',i===acIndex));}
    else if(e.key==='Enter'&&acIndex>=0){e.preventDefault();selectPerson(parseInt(items[acIndex].dataset.id));}
    else if(e.key==='Escape'){personDrop.classList.remove('show');}
});

document.addEventListener('click',function(e){if(!e.target.closest('.autocomplete-wrap')) personDrop.classList.remove('show');});

function selectPerson(id){
    if(selectedPersonIds.includes(id)) return;
    selectedPersonIds.push(id);
    personInput.value='';personDrop.classList.remove('show');
    renderSelectedPersons();
}
function removePerson(id){
    selectedPersonIds=selectedPersonIds.filter(x=>x!==id);
    renderSelectedPersons();
}
function renderSelectedPersons(){
    const wrap=document.getElementById('selectedPersons');
    wrap.innerHTML=selectedPersonIds.map(id=>{
        const c=contacts.find(x=>x.id===id);
        if(!c) return '';
        const col=getAvatarColor(c.name);
        return `<div class="person-tag" style="background:${col}">
            <span class="tag-avatar">${getInitials(c.name)}</span>
            ${c.name}
            <span class="tag-remove" onclick="removePerson(${c.id})">&times;</span>
        </div>`;
    }).join('');
}

    const descPlaceholders={peso:'Describe observaciones del peso',presion:'Describe presión, síntomas o recomendaciones',glucosa:'Describe nivel, horario y observaciones',entrenamiento:'Describe rutina, intensidad y sensaciones',otro:'Describe observaciones importantes'};

function getSmartHealthSummary(peopleIds, note){
    if(!peopleIds||!peopleIds.length) return '';
    const noteWeight=(note&&note.metricType==='peso')?Number(String(note.title).trim().replace(',','.')):null;
    const validNoteWeight=(noteWeight&&Number.isFinite(noteWeight)&&noteWeight>=20&&noteWeight<=400)?noteWeight:null;
    const panels=peopleIds.map(pid=>{
        const c=contacts.find(x=>x.id===pid);
        if(!c||!c.height) return '';
        const hasHistory=c.weightHistory&&c.weightHistory.length>0;
        if(!hasHistory&&!validNoteWeight) return '';
        const hist=c.weightHistory||[];
        const latestEntry=hist.length?hist[hist.length-1]:null;
        const weightUsed=latestEntry?latestEntry.weight:validNoteWeight;
        const bmi=weightUsed/(c.height*c.height);
        const info=getBmiLevel(bmi);
        const col=getAvatarColor(c.name);
        let trend='';
        if(hist.length>=2){
            const delta=(hist[hist.length-1].weight - hist[hist.length-2].weight);
            const abs=Math.abs(delta).toFixed(1);
            trend = delta>0.05 ? `<span style="color:#ff8080;">▲ +${abs} kg</span>`
                  : delta<-0.05? `<span style="color:#80ffb0;">▼ -${abs} kg</span>`
                  : `<span style="opacity:0.6;">→ Sin cambio</span>`;
        }
        const tipsHtml=info.tips.slice(0,3).map(t=>`<div class="bmi-tip-item"><span>•</span><span>${t}</span></div>`).join('');
        return `<div class="bmi-person-row">
            <div class="bmi-mini-avatar" style="background:${col}">${getInitials(c.name)}</div>
            <div class="bmi-info">
                <div class="bmi-name">${c.name}</div>
                <div class="bmi-badge-row">
                    <span class="bmi-badge" style="background:${info.color};color:#fff;">${info.icon} ${info.level}</span>
                    <span class="bmi-imc">IMC ${bmi.toFixed(1)} · ${info.grade}</span>
                    ${trend}
                </div>
                <div class="bmi-tips">${tipsHtml}</div>
            </div>
        </div>`;
    }).filter(Boolean);
    if(!panels.length) return '';
    return `<div class="bmi-panel">
        <div class="bmi-panel-title">🏥 Estado de Salud OMS</div>
        ${panels.join('')}
    </div>`;
}

function addContact(){
    const name=document.getElementById('contactName').value.trim();
    const phone=document.getElementById('contactPhone').value.trim();
    const email=document.getElementById('contactEmail').value.trim();
    const category=document.getElementById('contactCategory').value;
    const heightRaw=document.getElementById('contactHeight').value;
    const height=heightRaw?Number(String(heightRaw).replace(',', '.')):null;
    if(!name){alert('Por favor ingresa un nombre');return;}
    if(height!==null&&(height<0.8||height>2.5)){alert('Ingresa una talla válida en metros (0.80 a 2.50).');return;}
    contacts.push({id:Date.now(),name,phone,email,category,height,weightHistory:[]});
    saveContacts();resetContactForm();renderContacts();
}
function editContact(id){
    const c=contacts.find(x=>x.id===id);if(!c) return;
    document.getElementById('contactName').value=c.name;
    document.getElementById('contactPhone').value=c.phone;
    document.getElementById('contactEmail').value=c.email;
    document.getElementById('contactCategory').value=c.category;
    document.getElementById('contactHeight').value=c.height||'';
    document.getElementById('addContactBtn').style.display='none';
    document.getElementById('saveContactBtn').style.display='block';
    editingContactId=id;
    document.getElementById('contactName').focus();
}
function saveContactChanges(){
    if(!editingContactId) return;
    const i=contacts.findIndex(c=>c.id===editingContactId);if(i===-1) return;
    contacts[i].name=document.getElementById('contactName').value.trim();
    contacts[i].phone=document.getElementById('contactPhone').value.trim();
    contacts[i].email=document.getElementById('contactEmail').value.trim();
    contacts[i].category=document.getElementById('contactCategory').value;
    const newHeightRaw=document.getElementById('contactHeight').value;
    const newHeight=newHeightRaw?Number(String(newHeightRaw).replace(',', '.')):null;
    if(newHeight!==null&&(newHeight<0.8||newHeight>2.5)){alert('Ingresa una talla válida en metros (0.80 a 2.50).');return;}
    if(contacts[i].height&&newHeight&&Math.abs(contacts[i].height-newHeight)>0.001){
        alert('La talla ya fue registrada. Para mantener historial consistente solo se guarda una vez.');
        document.getElementById('contactHeight').value=contacts[i].height;
    } else if(!contacts[i].height&&newHeight){
        contacts[i].height=newHeight;
    }
    saveContacts();resetContactForm();renderContacts();
}
function deleteContact(id){
    if(!confirm('\u00bfEliminar este contacto?')) return;
    contacts=contacts.filter(c=>c.id!==id);saveContacts();renderContacts();
}
function resetContactForm(){
    ['contactName','contactPhone','contactEmail','contactHeight'].forEach(x=>document.getElementById(x).value='');
    document.getElementById('contactCategory').value='trabajo';
    document.getElementById('addContactBtn').style.display='block';
    document.getElementById('saveContactBtn').style.display='none';
    editingContactId=null;
}
function renderContacts(){
    const q=document.getElementById('contactSearchBar').value.trim().toLowerCase();
    const clearBtn=document.getElementById('searchClearBtn');
    clearBtn.style.display=q?'block':'none';
    let filtered=contacts;
    if(q) filtered=contacts.filter(c=>c.name.toLowerCase().includes(q)||c.phone.includes(q)||(c.email&&c.email.toLowerCase().includes(q))||c.category.toLowerCase().includes(q));
    filtered.sort((a,b)=>a.name.localeCompare(b.name));
    document.getElementById('contactCount').textContent=`${filtered.length} contacto${filtered.length!==1?'s':''}`;
    const wrap=document.getElementById('contactsList');
    if(!filtered.length){wrap.innerHTML=`<p style="text-align:center;color:var(--gray3);padding:30px;font-style:italic;">${q?'Sin resultados para "'+q+'"':'A\u00fan no tienes contactos.'}</p>`;return;}
    wrap.innerHTML=filtered.map(c=>{
        const col=getAvatarColor(c.name);
        const catCol=CATEGORY_COLORS[c.category]||'#7f8c8d';
        const hl=q?c.name.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<span class="ac-highlight">$1</span>'):c.name;
        const health=getHealthSummary(c);
        const latestW=c.weightHistory&&c.weightHistory.length?c.weightHistory[c.weightHistory.length-1].weight:null;
        const healthSection=health?`
            <div class="contact-bmi-section" style="background:${health.info.bg};border-left-color:${health.info.borderColor};">
                <div><span class="contact-bmi-badge" style="background:${health.info.color};">${health.info.icon} ${health.info.level} — ${health.info.grade}</span></div>
                <div class="contact-bmi-imc">IMC: <strong>${health.bmi.toFixed(2)}</strong> · Peso: <strong>${health.weight} kg</strong> · Talla: <strong>${c.height.toFixed(2)} m</strong></div>
                ${health.trendText?`<div class="weight-trend ${health.trendClass}">${health.trendText}</div>`:''}
                <div class="contact-bmi-tips"><strong>Recomendación OMS:</strong> ${health.recommendation}</div>
            </div>`
            :`<div class="contact-detail" style="color:var(--gray3);font-style:italic;margin-top:4px;">Registra talla y peso para ver estado OMS personalizado.</div>`;
        return `<div class="contact-card">
            <div class="contact-avatar" style="background:${col}">${getInitials(c.name)}</div>
            <div class="contact-info">
                <div class="contact-name">${hl}</div>
                <div class="contact-detail">${c.phone||'Sin teléfono'}${c.email?' · '+c.email:''}</div>
                <div class="contact-detail">Talla: ${c.height?c.height.toFixed(2)+' m':'No registrada'}${latestW?' · Último peso: '+latestW+' kg':''}</div>
                ${healthSection}
                <div style="margin-top:6px;"><span style="display:inline-block;padding:2px 10px;border-radius:10px;font-size:0.7em;font-weight:600;color:var(--white);background:${catCol};">${c.category}</span></div>
            </div>
            <div class="contact-actions">
                <button onclick="logWeight(${c.id})" title="Registrar peso">⚖️</button>
                <button onclick="viewWeightHistory(${c.id})" title="Historial de peso">📈</button>
                <button onclick="editContact(${c.id})" title="Editar">&#9998;</button>
                <button onclick="deleteContact(${c.id})" title="Eliminar">&#128465;</button>
            </div>
        </div>`;
    }).join('');
}

function getHealthSummary(contact){
    if(!contact.height||!contact.weightHistory||!contact.weightHistory.length) return null;
    const hist=contact.weightHistory;
    const latest=hist[hist.length-1].weight;
    const bmi=latest/(contact.height*contact.height);
    const info=getBmiLevel(bmi);
    let trendText='',trendClass='';
    if(hist.length>=2){
        const delta=(hist[hist.length-1].weight-hist[hist.length-2].weight);
        const abs=Math.abs(delta).toFixed(1);
        if(delta>0.05){trendText=`▲ +${abs} kg desde último control`;trendClass='trend-up';}
        else if(delta<-0.05){trendText=`▼ -${abs} kg desde último control`;trendClass='trend-down';}
        else{trendText='→ Sin cambio';trendClass='trend-flat';}
    }
    return {bmi,info,recommendation:info.tips[0],trendText,trendClass,weight:latest};
}

function logWeight(id){
    const c=contacts.find(x=>x.id===id);if(!c) return;
    if(!c.height){
        document.getElementById('modalTitle').textContent='⚠️ Talla no registrada';
        document.getElementById('modalBody').innerHTML=`<p style="color:var(--gray4);margin-bottom:16px;">Para calcular el IMC de <strong>${c.name}</strong> primero debes registrar su talla (solo se guarda una vez).</p><button class="btn" onclick="closeModal();editContact(${c.id})">Registrar talla ahora</button>`;
        document.getElementById('noteModal').classList.add('open');return;
    }
    document.getElementById('modalTitle').textContent=`⚖️ Registrar Peso — ${c.name}`;
    document.getElementById('modalBody').innerHTML=`
        <div style="margin-bottom:18px;">
            <label style="display:block;color:var(--gray4);font-weight:600;font-size:0.78em;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;">Peso actual (kg)</label>
            <input id="weightInput" type="number" min="20" max="400" step="0.1" placeholder="Ej: 72.5"

        </div>

function confirmLogWeight(id){
    const c=contacts.find(x=>x.id===id);if(!c) return;
    const inp=document.getElementById('weightInput');if(!inp) return;
    const kg=Number(String(inp.value).trim().replace(',','.'));
    if(!Number.isFinite(kg)||kg<20||kg>400){
        inp.style.borderColor='var(--red2)';
        document.getElementById('weightResult').innerHTML='<p style="color:var(--red2);font-weight:600;">⚠️ Peso inválido. Ingresa un valor entre 20 y 400 kg.</p>';
        return;
    }
    if(!Array.isArray(c.weightHistory)) c.weightHistory=[];
    c.weightHistory.push({date:new Date().toISOString(),weight:kg});
    const bmi=kg/(c.height*c.height);
    const info=getBmiLevel(bmi);
    const hist=c.weightHistory;
    let trendHtml='';
    if(hist.length>=2){
        const delta=(hist[hist.length-1].weight-hist[hist.length-2].weight);
        const abs=Math.abs(delta).toFixed(1);
        trendHtml=delta>0.05?`<div style="color:#e74c3c;font-weight:600;">▲ +${abs} kg desde el último control</div>`
            :delta<-0.05?`<div style="color:#27ae60;font-weight:600;">▼ -${abs} kg desde el último control</div>`
            :`<div style="color:var(--gray3);">→ Sin cambios significativos</div>`;
    }
    const tipsHtml=info.tips.map(t=>`<li style="margin-bottom:5px;">${t}</li>`).join('');
    document.getElementById('weightResult').innerHTML=`
        <div style="background:${info.bg};border:2px solid ${info.borderColor};border-radius:12px;padding:18px;">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
                <span style="font-size:2em;">${info.icon}</span>
                <div>
                    <div style="font-size:1.1em;font-weight:800;color:${info.color};">${info.level}</div>
                    <div style="font-size:0.8em;color:var(--gray4);">${info.grade} · IMC: <strong>${bmi.toFixed(2)}</strong></div>
                </div>
            </div>
            ${trendHtml}
            <div style="margin-top:12px;">
                <div style="font-size:0.78em;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gray4);margin-bottom:8px;">🏥 Recomendaciones OMS</div>
                <ul style="padding-left:18px;font-size:0.85em;color:var(--gray5);line-height:1.7;">${tipsHtml}</ul>
            </div>
        </div>`;
    saveContacts();renderContacts();
}

    });

    wsContacts['!cols']=[{wch:14},{wch:25},{wch:16},{wch:28},{wch:12},{wch:10},{wch:14},{wch:8},{wch:22},{wch:18},{wch:12}];
    XLSX.utils.book_append_sheet(wb,wsContacts,'Contactos y Estado OMS');

    /* ── Hoja 3: HISTORIAL DE PESO ── */
    const histData=[['Nombre','Fecha','Hora','Peso (kg)','Talla (m)','IMC','Estado OMS','Grado OMS','Recomendación Principal']];
    contacts.forEach(c=>{
        (c.weightHistory||[]).forEach(entry=>{
            const d=new Date(entry.date);
            const bmi=c.height?entry.weight/(c.height*c.height):null;
            const info=bmi?getBmiLevel(bmi):null;
            histData.push([c.name,d.toLocaleDateString('es-PE'),d.toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'}),entry.weight,c.height?c.height.toFixed(2):'',bmi?bmi.toFixed(2):'',info?info.level:'',info?info.grade:'',info?info.tips[0]:'']);
        });
    });
    const wsHist=XLSX.utils.aoa_to_sheet(histData);
    wsHist['!cols']=[{wch:25},{wch:12},{wch:8},{wch:10},{wch:10},{wch:8},{wch:22},{wch:18},{wch:55}];
    XLSX.utils.book_append_sheet(wb,wsHist,'Historial de Peso');

    /* ── Hoja 4: RESUMEN EJECUTIVO ── */
    const today=new Date().toLocaleDateString('es-PE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    const totalContacts=contacts.length;
    const withWeight=contacts.filter(c=>c.weightHistory&&c.weightHistory.length>0).length;
    const bmiCounts={};
    contacts.forEach(c=>{
        const hist=c.weightHistory||[];if(!hist.length||!c.height) return;
        const bmi=hist[hist.length-1].weight/(c.height*c.height);
        const level=getBmiLevel(bmi).level;
        bmiCounts[level]=(bmiCounts[level]||0)+1;
    });
    const summaryData=[
        ['RESUMEN EJECUTIVO — AGENDA MÉDICA'],['Generado:',today],[''],
        ['TOTAL CONTACTOS',totalContacts],['Con peso registrado',withWeight],['Sin datos de peso',totalContacts-withWeight],[''],
        ['DISTRIBUCIÓN POR ESTADO OMS','Cantidad'],
        ...Object.entries(bmiCounts).map(([k,v])=>[k,v]),[''],
        ['NOTAS TOTALES',notes.length],['Completadas',notes.filter(n=>n.completed).length],['Pendientes',notes.filter(n=>!n.completed&&!n.isRecurring).length],['Recurrentes',notes.filter(n=>n.isRecurring).length]
    ];
    const wsSummary=XLSX.utils.aoa_to_sheet(summaryData);
    wsSummary['!cols']=[{wch:30},{wch:20}];
    XLSX.utils.book_append_sheet(wb,wsSummary,'Resumen Ejecutivo');

    const filename=`Agenda_Leider_${new Date().toISOString().slice(0,10)}.xlsx`;
    XLSX.writeFile(wb,filename);
}

// ======= NOTES (with people) =======
function getRelevantNotes(dateStr,currentYear){
    const md=dateStr.substring(5);
    return notes.filter(n=>{if(!n.date) return false;if(n.date===dateStr) return true;if(n.isRecurring&&n.date.substring(5)===md) return true;return false;});
}

function autoLogWeightFromNote(metricType, title, date, peopleIds){
    if(metricType!=='peso'||!peopleIds||!peopleIds.length) return;
    const kg=Number(String(title).trim().replace(',','.'));
    if(!Number.isFinite(kg)||kg<20||kg>400) return;
    let changed=false;
    peopleIds.forEach(pid=>{
        const c=contacts.find(x=>x.id===pid);
        if(!c||!c.height) return;
        if(!Array.isArray(c.weightHistory)) c.weightHistory=[];
        const isoDate=(date||new Date().toISOString().slice(0,10))+'T12:00:00.000Z';
        const already=c.weightHistory.find(e=>e.date.slice(0,10)===(date||new Date().toISOString().slice(0,10))&&e.weight===kg);
        if(!already){c.weightHistory.push({date:isoDate,weight:kg});changed=true;}
    });
    if(changed) saveContacts();
}

function addNote(){
    const title=document.getElementById('noteTitle').value,desc=document.getElementById('noteDesc').value,date=normalizeDate(document.getElementById('noteDate').value),priority=document.getElementById('noteWeight').value,type=document.getElementById('noteType').value,metricType=document.getElementById('noteMetricType').value;

// ======= CALENDAR =======
function renderCalendar(){
    const year=currentDate.getFullYear(),month=currentDate.getMonth();
    document.getElementById('currentMonth').textContent=`${monthNames[month]} ${year}`;
    const firstDay=new Date(year,month,1),lastDay=new Date(year,month+1,0),prevLastDay=new Date(year,month,0);
    const firstDayIndex=(firstDay.getDay()===0)?6:firstDay.getDay()-1;
    const lastDayDate=lastDay.getDate();
    let html='';dayNames.forEach(d=>{html+=`<div class="day-label">${d}</div>`;});
    const pld=prevLastDay.getDate();
    for(let i=firstDayIndex;i>0;i--) html+=`<div class="day-cell other-month"><div class="day-number">${pld-i+1}</div></div>`;
    const today=new Date();
    for(let i=1;i<=lastDayDate;i++){
        const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
        const dow=new Date(ds).getDay();
        const dn=getRelevantNotes(ds,year),dt=dn.filter(n=>!n.isRecurring),db=dn.filter(n=>n.isRecurring);
        const ih=holidays[ds],it=today.getDate()===i&&today.getMonth()===month&&today.getFullYear()===year;
        let cls='day-cell';
        if(dow===0||dow===6) cls+=' weekend-day';
        if(db.length>0) cls+=' birthday';else if(ih) cls+=' holiday';else if(it) cls+=' today';else if(dt.length>0) cls+=' has-notes';
        const atc=dt.length>0&&dt.every(n=>n.completed),stp=dt.length>0&&dt.some(n=>!n.completed);
        let badge='';
        if(db.length>0) badge=`<div class="birthday-badge">\ud83c\udf82 ${db[0].title}</div>`;
        else if(ih) badge=`<div class="holiday-badge">${ih}</div>`;
        else if(atc) badge=`<div class="notes-badge" style="background:var(--green2);">\u2713</div>`;
        else if(stp) badge=`<div class="notes-badge">${dt.filter(n=>!n.completed).length}</div>`;
        html+=`<div class="${cls}" onclick="showDayNotes('${ds}')"><div class="day-number">${i}</div>${badge}</div>`;
    }
    const tc=firstDayIndex+lastDayDate,rc=(tc%7===0)?0:7-(tc%7);
    for(let i=1;i<=rc;i++) html+=`<div class="day-cell other-month"><div class="day-number">${i}</div></div>`;
    document.getElementById('calendarGrid').innerHTML=html;renderNotes();
}
function previousMonth(){currentDate.setMonth(currentDate.getMonth()-1);renderCalendar();}
function nextMonth(){currentDate.setMonth(currentDate.getMonth()+1);renderCalendar();}

function renderNotes(){
    const nl=document.getElementById('notesList');
    const cy=currentDate.getFullYear(),cm=currentDate.getMonth()+1,cms=String(cm).padStart(2,'0');
    document.getElementById('notesListMonth').textContent=`(${monthNames[cm-1]} ${cy})`;
    const fn=notes.filter(n=>{if(!n.date) return false;const nm=n.date.substring(5,7),ny=n.date.substring(0,4);if(nm===cms&&ny==cy) return true;if(n.isRecurring&&nm===cms) return true;return false;});
    if(!fn.length){nl.innerHTML='<p style="text-align:center;color:var(--gray3);padding:40px;font-family:var(--serif);font-style:italic;font-size:1.05em;">No hay notas para '+monthNames[cm-1]+'. \ud83e\udd73</p>';return;}

    const sortFn=(a,b)=>{if(a.isRecurring!==b.isRecurring) return a.isRecurring?-1:1;if(a.date!==b.date) return new Date(a.date)-new Date(b.date);if(a.completed!==b.completed) return a.completed?1:-1;return 0;};

    // Separate: notes with people vs without
    const withPeople=fn.filter(n=>n.people&&n.people.length>0);
    const withoutPeople=fn.filter(n=>!n.people||n.people.length===0);

    // Group by person
    const personGroups={};
    const usedNoteIds=new Set();
    withPeople.forEach(n=>{
        (n.people||[]).forEach(pid=>{
            if(!personGroups[pid]) personGroups[pid]=[];
            if(!personGroups[pid].find(x=>x.id===n.id)){
                personGroups[pid].push(n);
                usedNoteIds.add(n.id);
            }
        });
    });

    let html='';

    // Render person groups side by side in grid
    const personIds=Object.keys(personGroups).map(Number);
    personIds.sort((a,b)=>{
        const ca=contacts.find(x=>x.id===a),cb=contacts.find(x=>x.id===b);
        return (ca?ca.name:'').localeCompare(cb?cb.name:'');
    });

    if(personIds.length){
        html+='<div class="person-groups-grid">';
        personIds.forEach(pid=>{
            const c=contacts.find(x=>x.id===pid);
            if(!c) return;
            const col=getAvatarColor(c.name);
            const groupNotes=[...personGroups[pid]].sort(sortFn);
            html+=`<div class="person-group">
                <div class="person-group-header">
                    <div class="pg-avatar" style="background:${col}">${getInitials(c.name)}</div>
                    <div class="pg-name">${c.name}</div>
                    <div class="pg-count">${groupNotes.length} nota${groupNotes.length!==1?'s':''}</div>
                </div>
                <div class="person-group-list">${groupNotes.map(n=>renderNoteCard(n)).join('')}</div>
            </div>`;
        });
        html+='</div>';
    }

    // Render ungrouped notes (sin persona) in the grid
    const ungrouped=[...withoutPeople].sort(sortFn);
    if(ungrouped.length){
        if(personIds.length) html+=`<div style="margin-top:8px;margin-bottom:14px;padding:8px 0;border-top:2px solid var(--gray2);"><span style="font-family:var(--serif);font-size:0.88em;color:var(--gray4);font-weight:600;">Sin persona asignada</span></div>`;
        html+=`<div class="notes-list">${ungrouped.map(n=>renderNoteCard(n)).join('')}</div>`;
    }

    nl.innerHTML=html;
}

function updateTicker(){
    const t=new Date(),y=t.getFullYear(),ts=`${y}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
    const tn=getRelevantNotes(ts,y),tp=tn.filter(n=>!n.isRecurring&&!n.completed),tr=tn.filter(n=>n.isRecurring),h=holidays[ts];
    let tk='';
    if(h) tk+=`<span class="ticker-item"><span class="ticker-icon">\ud83c\udf89</span>Hoy es ${h}</span>`;
    tr.forEach(n=>{tk+=`<span class="ticker-item"><span class="ticker-icon">\ud83c\udf82</span>${n.title}</span>`;});
    tp.forEach(n=>{tk+=`<span class="ticker-item"><span class="ticker-icon">\ud83d\udccc</span>${n.title}</span>`;});
    if(!h&&!tn.length) tk='<span class="ticker-item"><span class="ticker-icon">\u2728</span>No hay eventos pendientes para hoy</span>';
    document.getElementById('tickerContent').innerHTML=tk;
}

function checkTodayAlerts(){
    const t=new Date(),y=t.getFullYear(),ts=`${y}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
    const tn=getRelevantNotes(ts,y),bd=tn.filter(n=>n.isRecurring),pt=tn.filter(n=>!n.isRecurring&&!n.completed),h=holidays[ts];
    let a='';
    if(h) a+=`\ud83c\udf89 HOY ES FERIADO: ${h}\n\n`;
    if(bd.length){a+='EVENTOS RECURRENTES:\n';bd.forEach(b=>{a+=`  \ud83c\udf82 ${b.title} - ${b.desc}\n`;});a+='\n';}
    if(pt.length){a+='TAREAS PENDIENTES:\n';pt.forEach(t=>{a+=`  \u2022 ${t.title}\n`;});}
    if(a) setTimeout(()=>alert(a),500);
}

function closeModal(){document.getElementById('noteModal').classList.remove('open');}

function showDayNotes(ds){
    const cy=currentDate.getFullYear(),dn=getRelevantNotes(ds,cy),h=holidays[ds];
    if(!dn.length&&!h){document.getElementById('noteDate').value=ds;document.querySelector('.note-form').scrollIntoView({behavior:'smooth',block:'start'});document.getElementById('noteTitle').focus();return;}
    const df=new Date(ds+'T00:00:00').toLocaleDateString('es-ES',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    document.getElementById('modalTitle').textContent=`Detalles del ${df}`;
    let mb='';
    if(h) mb+=`<div style="background:var(--purple-light);padding:16px;border-radius:var(--radius-sm);margin-bottom:18px;border:2px solid var(--purple1);text-align:center;"><h3 style="color:var(--purple1);margin:0;font-family:var(--serif);">\ud83c\udf89 FERIADO NACIONAL</h3><p style="font-size:1.05em;color:var(--gray4);margin-top:5px;">${h}</p></div>`;
    if(dn.length){
        const sd=dn.sort((a,b)=>{if(a.isRecurring!==b.isRecurring) return a.isRecurring?-1:1;if(a.completed!==b.completed) return a.completed?1:-1;return 0;});
        sd.forEach(n=>{
            const ir=n.isRecurring,st=ir?'Evento Anual':(n.completed?'Completado':'Pendiente'),sc=ir?'':(n.completed?'':'pending');
            mb+=`<div class="modal-note-item priority-${n.priority} ${ir?'birthday':''} ${n.completed&&!ir?'completed':''}">
                <h4>${ir?'\ud83c\udf82 ':''}${n.title}</h4><p><strong>Observaciones:</strong> ${n.desc}</p>
                ${getPeopleHTML(n.people)}
                <div class="modal-status ${sc}">${st}</div>
                <div class="modal-actions">
                    <button class="action-btn" onclick="closeModal();editNote(${n.id});" title="Editar">&#9998;</button>
                    ${!ir?`<button class="action-btn" onclick="toggleComplete(${n.id});showDayNotes('${ds}');">${n.completed?'\u2611':'\u2713'}</button>`:''}
                    <button class="action-btn" onclick="deleteNote(${n.id});showDayNotes('${ds}');">&#128465;</button>
                </div>
            </div>`;
        });
    }else if(h) mb+='<p style="text-align:center;color:var(--gray3);padding:20px;">Disfruta el feriado! \ud83c\udfd6\ufe0f</p>';
    document.getElementById('modalBody').innerHTML=mb;
    document.getElementById('noteModal').classList.add('open');
}

// INIT
const _id=new Date();document.getElementById('noteDate').value=_id.getFullYear()+'-'+String(_id.getMonth()+1).padStart(2,'0')+'-'+String(_id.getDate()).padStart(2,'0');
updateTitlePlaceholder();
renderCalendar();updateTicker();checkTodayAlerts();

// ======= CLOUD SYNC INIT =======
async function manualSync() {
    const loaded = await cloudLoad();
    if (loaded) {
        renderCalendar();
        renderNotes();
        renderContacts();
        updateTicker();
    }
}

// Auto-load from cloud on startup, then auto-sync every 15 segundos
(async function initCloud() {
    if (!SHEET_URL) {
        setSyncStatus('local');
        return;
    }
    // Carga inicial desde el cloud
    const loaded = await cloudLoad();
    if (loaded) {
        renderCalendar();
        renderNotes();
        renderContacts();
        updateTicker();
    }
    // Sincroniza cada 15 segundos para ver cambios de otros usuarios casi en tiempo real
    syncInterval = setInterval(async () => {
        // Si hay guardados en vuelo, no cargues del cloud: los perder\u00edas.
        if (pendingSaves > 0) return;
        const ok = await cloudLoad();
        if (ok) {
            renderCalendar();
            renderNotes();
            renderContacts();
            updateTicker();
        }
    }, 15000);
})();

// ======= SERVICE WORKER (PWA) =======
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').then(reg => {
        // Detecta nueva versión y recarga automáticamente
        reg.addEventListener('updatefound', () => {
            const w = reg.installing;
            w.addEventListener('statechange', () => {
                if (w.state === 'activated' && navigator.serviceWorker.controller) {
                    window.location.reload();
                }
            });
        });
    });
}
