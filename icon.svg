<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3c72"/>
      <stop offset="100%" stop-color="#3467b7"/>
    </linearGradient>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a5298"/>
      <stop offset="100%" stop-color="#3467b7"/>
    </linearGradient>
  </defs>
  <!-- Fondo redondeado -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Cuerpo del calendario -->
  <rect x="72" y="130" width="368" height="300" rx="28" fill="white" opacity="0.97"/>
  <!-- Cabecera del calendario -->
  <rect x="72" y="130" width="368" height="100" rx="28" fill="url(#header)"/>
  <rect x="72" y="185" width="368" height="45" fill="url(#header)"/>
  <!-- Texto mes -->
  <text x="256" y="193" text-anchor="middle" fill="white" font-size="36" font-weight="700" font-family="Arial, sans-serif" letter-spacing="3">AGENDA</text>
  <!-- Argollas -->
  <rect x="168" y="96" width="32" height="75" rx="16" fill="#f39c12"/>
  <rect x="312" y="96" width="32" height="75" rx="16" fill="#f39c12"/>
  <!-- Días de la semana -->
  <text x="130" y="260" text-anchor="middle" fill="#6b7280" font-size="22" font-family="Arial">L</text>
  <text x="192" y="260" text-anchor="middle" fill="#6b7280" font-size="22" font-family="Arial">M</text>
  <text x="256" y="260" text-anchor="middle" fill="#6b7280" font-size="22" font-family="Arial">X</text>
  <text x="320" y="260" text-anchor="middle" fill="#6b7280" font-size="22" font-family="Arial">J</text>
  <text x="384" y="260" text-anchor="middle" fill="#6b7280" font-size="22" font-family="Arial">V</text>
  <!-- Fila 1 de números -->
  <text x="130" y="305" text-anchor="middle" fill="#374151" font-size="26" font-weight="600" font-family="Arial">1</text>
  <text x="192" y="305" text-anchor="middle" fill="#374151" font-size="26" font-weight="600" font-family="Arial">2</text>
  <text x="256" y="305" text-anchor="middle" fill="#374151" font-size="26" font-weight="600" font-family="Arial">3</text>
  <text x="320" y="305" text-anchor="middle" fill="#374151" font-size="26" font-weight="600" font-family="Arial">4</text>
  <text x="384" y="305" text-anchor="middle" fill="#374151" font-size="26" font-weight="600" font-family="Arial">5</text>
  <!-- Fila 2 — con día destacado -->
  <circle cx="130" cy="351" r="20" fill="#1e3c72"/>
  <text x="130" y="358" text-anchor="middle" fill="white" font-size="26" font-weight="700" font-family="Arial">8</text>
  <text x="192" y="358" text-anchor="middle" fill="#374151" font-size="26" font-weight="600" font-family="Arial">9</text>
  <text x="256" y="358" text-anchor="middle" fill="#374151" font-size="26" font-weight="600" font-family="Arial">10</text>
  <text x="320" y="358" text-anchor="middle" fill="#374151" font-size="26" font-weight="600" font-family="Arial">11</text>
  <!-- Punto de nota -->
  <circle cx="320" cy="367" r="5" fill="#e74c3c"/>
  <text x="384" y="358" text-anchor="middle" fill="#374151" font-size="26" font-weight="600" font-family="Arial">12</text>
  <!-- Fila 3 -->
  <text x="130" y="411" text-anchor="middle" fill="#374151" font-size="26" font-weight="600" font-family="Arial">15</text>
  <text x="192" y="411" text-anchor="middle" fill="#374151" font-size="26" font-weight="600" font-family="Arial">16</text>
  <text x="256" y="411" text-anchor="middle" fill="#27ae60" font-size="26" font-weight="700" font-family="Arial">17</text>
  <circle cx="256" cy="419" r="4" fill="#27ae60"/>
</svg>
